syntax = "proto3";

package arcoloom.worker.v1;

option go_package = "github.com/arcoloom/arco-worker/gen/proto/arcoloom/worker/v1;workerv1";

service WorkerService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc ReportStatus(ReportStatusRequest) returns (ReportStatusResponse);
  rpc ReportSignal(ReportSignalRequest) returns (ReportSignalResponse);
}

enum RuntimeKind {
  RUNTIME_KIND_UNSPECIFIED = 0;
  RUNTIME_KIND_DOCKER = 1;
  RUNTIME_KIND_EXEC = 2;
}

enum TaskState {
  TASK_STATE_UNSPECIFIED = 0;
  TASK_STATE_PREPARING = 1;
  TASK_STATE_RUNNING = 2;
  TASK_STATE_SUCCESS = 3;
  TASK_STATE_FAILED = 4;
}

enum SignalType {
  SIGNAL_TYPE_UNSPECIFIED = 0;
  SIGNAL_TYPE_SPOT_RECLAIM_RISK = 1;
  SIGNAL_TYPE_NODE_UNHEALTHY = 2;
}

message RegisterRequest {
  string instance_id = 1;
  string provider = 2;
  string registration_token = 3;
}

message RegisterResponse {
  string task_id = 1;
  RuntimeKind runtime_kind = 2;
  string payload = 3;
}

message ReportStatusRequest {
  string task_id = 1;
  TaskState state = 2;
  string message = 3;
}

message ReportStatusResponse {}

message ReportSignalRequest {
  string task_id = 1;
  SignalType signal_type = 2;
  string detail = 3;
}

message ReportSignalResponse {}
